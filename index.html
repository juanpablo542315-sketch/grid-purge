<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TRON: GRID PURGE</title>
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-white d-flex flex-column min-vh-100">

    <nav class="navbar navbar-dark bg-black border-bottom border-primary shadow-lg">
        <div class="container-fluid px-4">
            <span class="navbar-brand h1 fw-bold text-cyan">SISTEMA TRON: GRID PURGE</span>
            <span class="text-secondary">Programador: Juan Pablo Hernandez Martinez | <b class="text-cyan">AZUL</b> vs <b class="text-warning">NARANJA</b></span>
        </div>
    </nav>

    <main class="container-fluid my-auto px-4">
        <div class="row gx-5 align-items-center">
            
            <div class="col-lg-4">
                <div class="card bg-black border-primary shadow-neon">
                    <div class="card-body p-4">
                        <h5 class="fw-bold border-bottom border-secondary pb-2 text-cyan">DATA LOG: MISSION INFO</h5>
                        
                        <div id="stats-panel" class="mt-3 mb-1 font-monospace">
                            <div class="text-white">NIVEL: <span id="stat-nivel" class="text-cyan">1</span></div>
                            <div class="text-white">TIEMPO: <span id="stat-tiempo" class="text-cyan">0s</span></div>
                            <div class="text-white">RÉCORD: <span id="stat-record" class="text-warning">0s</span></div>
                        </div>

                        <div id="instruction-text" class="my-4" style="min-height: 150px; font-size: 1.1rem;">
                            <p class="text-white">Bienvenido al Grid, Usuario. Prepárate para la purga del sistema.</p>
                        </div>

                        <div class="d-grid gap-3">
                            <button id="btn-next" class="btn btn-outline-cyan fw-bold">SIGUIENTE ></button>
                            <button id="btn-restart" class="btn btn-outline-secondary d-none" onclick="resetGame()">REINICIAR SISTEMA</button>
                        </div>

                        <div class="mt-4 pt-3 border-top border-secondary">
                            <h5 class="mb-0"><span class="text-cyan-status">STATUS:</span> <span id="game-status" class="text-white">STANDBY</span></h5>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8 text-center">
                <div id="game-container" class="border border-info rounded overflow-hidden shadow-neon position-relative">
                    <video autoplay muted loop id="bg-video">
                        <source src="https://assets.mixkit.co/videos/preview/mixkit-grid-of-blue-lights-in-the-dark-31231-large.mp4" type="video/mp4">
                    </video>
                    <canvas id="gameCanvas"></canvas>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-black text-center py-2 border-top border-primary mt-auto">
        <p class="mb-0 small text-secondary">Materia: Graficación 2D | Examen Tema 2 | 2026</p>
    </footer>

    <audio id="tron-music" loop>
        <source src="assets/tron_theme.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
